<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Container Packing Optimizer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f4f8;
      color: #1a202c;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 2.5rem;
      width: 100%;
      max-width: 520px;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
    }

    .subtitle {
      font-size: 0.9rem;
      color: #6b7280;
      margin-bottom: 2rem;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 0.4rem;
    }

    .field { margin-bottom: 1.25rem; }

    input[type="file"],
    input[type="text"] {
      width: 100%;
      padding: 0.6rem 0.75rem;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 0.9rem;
      background: #f9fafb;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="file"]:focus,
    input[type="text"]:focus {
      border-color: #3b82f6;
      background: #fff;
    }

    .hint {
      font-size: 0.78rem;
      color: #9ca3af;
      margin-top: 0.3rem;
    }

    button {
      width: 100%;
      padding: 0.75rem;
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover:not(:disabled) { background: #2563eb; }
    button:disabled { background: #93c5fd; cursor: not-allowed; }

    #status {
      margin-top: 1.25rem;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.88rem;
      display: none;
    }

    #status.loading {
      background: #eff6ff;
      color: #1d4ed8;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    #status.success {
      background: #f0fdf4;
      color: #15803d;
      display: block;
    }

    #status.error {
      background: #fef2f2;
      color: #b91c1c;
      display: block;
      white-space: pre-wrap;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 3px solid #bfdbfe;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #downloadBtn {
      display: none;
      margin-top: 0.75rem;
      background: #16a34a;
    }

    #downloadBtn:hover { background: #15803d; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Container Packing Optimizer</h1>
    <p class="subtitle">Upload your order spreadsheet to generate a packing report.</p>

    <form id="form">
      <div class="field">
        <label for="file">Order file (.xlsx)</label>
        <input type="file" id="file" name="file" accept=".xlsx,.xls" required />
      </div>

      <div class="field">
        <label for="count_col">Order quantity column <span style="font-weight:400;color:#9ca3af">(optional)</span></label>
        <input type="text" id="count_col" name="count_col"
               placeholder="e.g. External Packaging Quantity" />
        <p class="hint">Leave blank — the optimizer will auto-detect the right column.</p>
      </div>

      <button type="submit" id="runBtn">Run Optimizer</button>
    </form>

    <div id="status"></div>
    <button id="downloadBtn">Download Report</button>
  </div>

  <script>
    const form        = document.getElementById("form");
    const runBtn      = document.getElementById("runBtn");
    const status      = document.getElementById("status");
    const downloadBtn = document.getElementById("downloadBtn");

    let _reportBlob = null;

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const fileInput = document.getElementById("file");
      if (!fileInput.files.length) return;

      // Reset UI
      downloadBtn.style.display = "none";
      _reportBlob = null;
      runBtn.disabled = true;

      status.className = "loading";
      status.innerHTML = '<div class="spinner"></div><span>Running optimizer — this may take a moment...</span>';

      const data = new FormData(form);

      try {
        const resp = await fetch("/optimize", { method: "POST", body: data });

        if (resp.ok) {
          const blob = await resp.blob();
          _reportBlob = blob;

          status.className = "success";
          status.textContent = "Optimization complete. Download your report below.";
          downloadBtn.style.display = "block";
        } else {
          const body = await resp.json().catch(() => ({ detail: resp.statusText }));
          const msg  = body.detail || "An error occurred.";
          status.className = "error";
          status.textContent = "Error: " + msg;
        }
      } catch (err) {
        status.className = "error";
        status.textContent = "Network error: " + err.message;
      } finally {
        runBtn.disabled = false;
      }
    });

    downloadBtn.addEventListener("click", () => {
      if (!_reportBlob) return;
      const url = URL.createObjectURL(_reportBlob);
      const a   = document.createElement("a");
      a.href     = url;
      a.download = "packing_report.xlsx";
      a.click();
      URL.revokeObjectURL(url);
    });
  </script>
</body>
</html>
